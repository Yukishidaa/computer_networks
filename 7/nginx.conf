events {}

http {
    include /etc/nginx/conf.d/block_rs.conf; # Теперь это внутри http и сработает!

    server {
        listen 80;
        server_name localhost;

        location / {
            if ($lan_country = "RU") {
                return 403 "ВАМ СЮДА НЕЛЬЗЯ: Доступ ограничен для вашего региона\n";
            }

            proxy_pass http://api_shikimori:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
